services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: progress
      POSTGRES_PASSWORD: progress
      POSTGRES_DB: progress
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U progress -d progress"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:6379:6379"

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: npm run db:deploy -w @progress/api
    environment:
      DATABASE_URL: postgresql://progress:progress@postgres:5432/progress?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://progress:progress@postgres:5432/progress?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 4000
      WEB_ORIGIN: http://localhost:3000
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: npm run start:worker -w @progress/api
    environment:
      DATABASE_URL: postgresql://progress:progress@postgres:5432/progress?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: /api/v1
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  redis_data:
